<!doctype html>
<html>
  <body style="margin:0;padding:0;background:#f6f7fb;">
    <div style="max-width:560px;margin:0 auto;padding:24px;">
      <div style="background:#ffffff;border-radius:12px;padding:24px;border:1px solid #eee;">
        <h2 style="margin:0 0 12px 0;font-size:18px;color:#111;">邮箱验证码</h2>

        <p style="margin:0 0 16px 0;color:#333;line-height:1.6;">
          你的验证码是：
        </p>

        <div style="font-size:28px;letter-spacing:6px;font-weight:700;color:#111;
                    background:#f3f4f6;border-radius:10px;padding:14px 16px;
                    display:inline-block;">
          {{ code }}
        </div>

        <p style="margin:16px 0 0 0;color:#666;line-height:1.6;">
          有效期 {{ minutes }} 分钟。如果不是你本人操作，请忽略此邮件。
        </p>

        <hr style="border:none;border-top:1px solid #eee;margin:20px 0;" />

        <p style="margin:0;color:#999;font-size:12px;">
          此邮件由系统自动发送，请勿回复。
        </p>
      </div>
    </div>
  </body>
</html>
