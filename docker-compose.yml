services:
  postgres:
    image: pgvector/pgvector:pg18-trixie
    container_name: mango-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mango_project_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - mango_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: mango-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - mango_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    container_name: mango-rabbit
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-mango}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-change-me}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - mango_rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
    container_name: mango-web
    restart: unless-stopped
    env_file:
      - .env
      - .env.docker
    command: ["/app/resource/scripts/docker/start_web.sh"]
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./resource/tmp_celery_logs:/app/resource/tmp_celery_logs
      - ./resource/tmp_celery_state:/app/resource/tmp_celery_state
      - ./resource/logo_downloads:/app/resource/logo_downloads

  beat:
    build:
      context: .
    container_name: mango-beat
    restart: unless-stopped
    env_file:
      - .env
      - .env.docker
    command: ["/app/resource/scripts/docker/start_beat.sh"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./resource/tmp_celery_logs:/app/resource/tmp_celery_logs
      - ./resource/tmp_celery_state:/app/resource/tmp_celery_state
      - ./resource/logo_downloads:/app/resource/logo_downloads

  worker-market:
    build:
      context: .
    container_name: mango-worker-market
    restart: unless-stopped
    env_file:
      - .env
      - .env.docker
    command: ["/app/resource/scripts/docker/start_worker.sh", "market_worker", "market_sync,news_ingest"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./resource/tmp_celery_logs:/app/resource/tmp_celery_logs
      - ./resource/tmp_celery_state:/app/resource/tmp_celery_state
      - ./resource/logo_downloads:/app/resource/logo_downloads

  worker-snapshot:
    build:
      context: .
    container_name: mango-worker-snapshot
    restart: unless-stopped
    env_file:
      - .env
      - .env.docker
    command: ["/app/resource/scripts/docker/start_worker.sh", "snapshot_worker", "snapshot_capture,snapshot_aggregate,snapshot_cleanup"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./resource/tmp_celery_logs:/app/resource/tmp_celery_logs
      - ./resource/tmp_celery_state:/app/resource/tmp_celery_state
      - ./resource/logo_downloads:/app/resource/logo_downloads

  worker-ai:
    build:
      context: .
    container_name: mango-worker-ai
    restart: unless-stopped
    env_file:
      - .env
      - .env.docker
    command: ["/app/resource/scripts/docker/start_worker.sh", "ai_worker", "news_embedding,ai_analysis"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./resource/tmp_celery_logs:/app/resource/tmp_celery_logs
      - ./resource/tmp_celery_state:/app/resource/tmp_celery_state
      - ./resource/logo_downloads:/app/resource/logo_downloads

volumes:
  mango_postgres_data:
    external: true
    name: ${POSTGRES_VOLUME_NAME:-mango_postgres_data}
  mango_redis_data:
    external: true
    name: ${REDIS_VOLUME_NAME:-mango_redis_data}
  mango_rabbitmq_data:
    external: true
    name: ${RABBITMQ_VOLUME_NAME:-mango_rabbitmq_data}
