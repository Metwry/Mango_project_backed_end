defaults:
  provider: aliyun
  temperature: 0
  timeout: 60
  max_retries: 2
  expects_json: true

providers:
  aliyun:
    api_key_env: ALI_API_KEY
  openai:
    api_key_env: OPENAI_API_KEY
  ollama:
    base_url_env: OLLAMA_BASE_URL

tasks:
  news_analysis:
    prompt_file: news_analysis.txt
    source_type: news_article
    provider: aliyun
    model: qwen-plus
    enable_thinking: false
